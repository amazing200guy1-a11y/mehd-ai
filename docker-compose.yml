# ──────────────────────────────────────────────
# Mehd AI — Docker Compose (Full Stack)
# ──────────────────────────────────────────────
# THE BATTERY SLOT: One command to run everything.
#
# Usage:
#   docker compose up          (foreground)
#   docker compose up -d       (background)
#   docker compose down        (stop)
#   docker compose logs -f api (follow logs)
#
# Environment:
#   Copy backend/.env.example to backend/.env
#   Fill in your API keys
#   docker compose up — done.
# ──────────────────────────────────────────────

services:
  # ── Main API Server ──
  api:
    build:
      context: ./mehd-ai/backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./mehd-ai/backend/.env
    environment:
      - RISK_MICROSERVICE_URL=http://risk:8001
      - DECOUPLED_WORKER_MODE=true
    depends_on:
      risk:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── Isolated Risk Microservice ──
  risk:
    build:
      context: ./mehd-ai/backend
      dockerfile: Dockerfile
    command: ["uvicorn", "risk_microservice:app", "--host", "0.0.0.0", "--port", "8001", "--log-level", "info"]
    env_file:
      - ./mehd-ai/backend/.env
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Dedicated Background Worker ──
  worker:
    build:
      context: ./mehd-ai/backend
      dockerfile: Dockerfile
    command: ["python", "worker.py"]
    env_file:
      - ./mehd-ai/backend/.env
    environment:
      - RISK_MICROSERVICE_URL=http://risk:8001
    depends_on:
      risk:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Landing Page (Static) ──
  landing:
    image: nginx:alpine
    ports:
      - "3001:80"
    volumes:
      - ./landing:/usr/share/nginx/html:ro
    restart: unless-stopped
