<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehd AI — Payment Successful</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background-color: var(--bg-main);
        }
        .success-card {
            max-width: 400px;
            padding: 40px;
            border: 1px solid rgba(88, 166, 255, 0.3);
            border-radius: 16px;
            background: var(--bg-card);
            box-shadow: 0 0 30px rgba(88, 166, 255, 0.1);
        }
        .success-icon {
            font-size: 48px;
            color: var(--green);
            margin-bottom: 20px;
        }
        h2 { margin-bottom: 16px; }
        p { color: var(--text-secondary); margin-bottom: 32px; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="success-card glass-card">
        <div class="success-icon">✓</div>
        <h2 class="accent-text">Payment Successful</h2>
        <p>Your subscription is now active. You may securely close this browser tab and return to the Mehd AI application to access your upgraded features.</p>
        <!-- In a future iteration with a custom URI scheme, this button will deep-link back to the app: href="mehdai://success" -->
        <a href="#" onclick="window.close(); return false;" class="btn btn--glow btn--full">
            <span class="btn__shimmer"></span>
            Close Browser
        </a>
    </div>
</body>
</html>
