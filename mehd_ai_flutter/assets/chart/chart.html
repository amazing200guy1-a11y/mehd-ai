<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<script src="lightweight-charts.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; }
  #chart-container { width:100vw; height:100vh; position:relative; }

  #anim-overlay {
    position:absolute; top:0; left:0;
    width:100%; height:100%;
    pointer-events:none; z-index:10;
  }
  .ghost-line {
    position:absolute; left:0;
    height:1.5px; width:0%;
    background:currentColor;
    box-shadow:0 0 8px currentColor, 0 0 15px currentColor;
    transition:width 1.2s cubic-bezier(0.16,1,0.3,1);
  }
  .ghost-label {
    position:absolute; right:10px;
    font-family:'Courier New',monospace; font-size:12px; font-weight:bold;
    color:currentColor; transform:translateY(-120%);
    opacity:0; transition:opacity 0.3s ease 1s;
  }
  .ghost-cursor {
    position:absolute; left:0; top:-14px;
    width:22px; height:22px;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="white" stroke="%23333" stroke-width="1.5"><path d="M5.5 3.21V20.8c0 .45.54.67.85.35l4.86-4.86a.5.5 0 0 1 .35-.15h6.87c.45 0 .67-.54.35-.85L6.35 2.85a.5.5 0 0 0-.85.35Z"/></svg>');
    background-size:contain; background-repeat:no-repeat;
    opacity:0; animation:cursorTravel 1.2s cubic-bezier(0.16,1,0.3,1) forwards;
  }
  @keyframes cursorTravel {
    0%   { left:0%; opacity:1; }
    95%  { left:calc(100% - 22px); opacity:1; }
    100% { left:calc(100% - 22px); opacity:0; }
  }

  #ctx-menu {
    display:none; position:fixed; z-index:9999;
    background:#1a1a2e; border:1px solid #333; border-radius:8px;
    padding:4px 0; min-width:160px;
    box-shadow:0 8px 24px rgba(0,0,0,0.6);
    font-family:'Courier New',monospace; font-size:13px;
  }
  #ctx-menu div {
    padding:8px 16px; color:#ccc; cursor:pointer;
    transition:background 0.15s;
  }
  #ctx-menu div:hover { background:#2d2d4e; color:#fff; }
  #ctx-menu hr { border:none; border-top:1px solid #333; margin:4px 0; }

  #status-bar {
    position:absolute; top:8px; left:50%; transform:translateX(-50%);
    z-index:50; font-family:'Courier New',monospace; font-size:11px;
    color:#555; pointer-events:none;
    transition: color 0.5s;
  }
  #status-bar.live { color:#26a69a; }
  #status-bar.loading { color:#FFA500; }
  #status-bar.error { color:#FF3B3B; }
</style>
</head>
<body>
<div id="chart-container">
  <div id="chart-el" style="width:100%;height:100%;"></div>
  <div id="status-bar" class="loading">● WAITING FOR DATA...</div>
  <div id="anim-overlay">
    <svg id="draw-svg" width="100%" height="100%" style="position:absolute;top:0;left:0;pointer-events:none;"></svg>
  </div>
</div>
<div id="ctx-menu">
  <div id="ctx-clear-all">🗑 Clear All Lines</div>
  <div id="ctx-clear-last">✂ Remove Last Line</div>
  <hr>
  <div id="ctx-cancel">✕ Cancel</div>
</div>

<script>
const statusBar = document.getElementById('status-bar');
function setStatus(msg, cls) {
  statusBar.textContent = msg;
  statusBar.className = cls || '';
}

const container = document.getElementById('chart-el');
const chart = LightweightCharts.createChart(container, {
  width:  window.innerWidth,
  height: window.innerHeight,
  layout:  { background:{ type:'solid', color:'#000000' }, textColor:'#888888' },
  grid:    { vertLines:{ color:'#111111' }, horzLines:{ color:'#111111' } },
  crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
  rightPriceScale: { borderColor:'#222' },
  timeScale: { borderColor:'#222', timeVisible:true, secondsVisible:false, barSpacing: 12, rightOffset: 8 },
  handleScroll: true,
  handleScale:  true,
});

const candles = chart.addCandlestickSeries({
  upColor:'#26a69a', downColor:'#ef5350',
  borderUpColor:'#26a69a', borderDownColor:'#ef5350',
  wickUpColor:'#26a69a', wickDownColor:'#ef5350',
});

window.addEventListener('resize', () => chart.resize(window.innerWidth, window.innerHeight));

// Variables have been moved to the bottom.
function clearAllDrawings() {
  drawnPriceLines.forEach(item => {
    try { candles.removePriceLine(item.line); } catch(e) {}
  });
  drawnPriceLines = [];
  const svg = document.getElementById('draw-svg');
  if (svg) svg.innerHTML = '';
  pendingFibClick = null;
}

function removeLastDrawing() {
  if (drawnPriceLines.length === 0) return;
  const last = drawnPriceLines.pop();
  try { candles.removePriceLine(last.line); } catch(e) {}
}

function addHLine(price, color, label) {
  const pl = candles.createPriceLine({
    price, color, lineWidth:1.5, lineStyle:2, axisLabelVisible:true, title: label || 'Manual',
  });
  drawnPriceLines.push({ line:pl, label });
  return pl;
}

chart.subscribeClick((param) => {
  if (drawingMode !== 'manual' || !activeTool) return;
  if (!param.point) return;
  const price = candles.coordinateToPrice(param.point.y);
  if (!price) return;

  if (activeTool === 'hline') {
    addHLine(price, '#58A6FF', 'Manual');
    sendToFlutter({ type:'validate_request', price, tool:'hline' });
  }
  if (activeTool === 'fib') {
    if (!pendingFibClick) {
      pendingFibClick = price;
    } else {
      const high = Math.max(pendingFibClick, price);
      const low  = Math.min(pendingFibClick, price);
      [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1].forEach((lvl, i) => {
        const colors = ['#FF6B6B','#FFA500','#FFD700','#00FF88','#58A6FF','#B47FFF','#FF6B6B'];
        addHLine(high - (high - low) * lvl, colors[i], `Fib ${Math.round(lvl*1000)/10}%`);
      });
      pendingFibClick = null;
      sendToFlutter({ type:'validate_request', price:low, tool:'fib' });
    }
  }
  if (activeTool === 'trendline') {
    addHLine(price, '#B47FFF', 'Trend');
    sendToFlutter({ type:'validate_request', price, tool:'trendline' });
  }
});

const ctxMenu = document.getElementById('ctx-menu');
function showCtxMenu(x, y) {
  ctxMenu.style.display = 'block';
  const mw = 170, mh = 120;
  ctxMenu.style.left = (x + mw > window.innerWidth  ? x - mw : x) + 'px';
  ctxMenu.style.top  = (y + mh > window.innerHeight ? y - mh : y) + 'px';
}
function hideCtxMenu() { ctxMenu.style.display = 'none'; }
document.getElementById('ctx-clear-all').addEventListener('click',  () => { clearAllDrawings();  hideCtxMenu(); });
document.getElementById('ctx-clear-last').addEventListener('click', () => { removeLastDrawing(); hideCtxMenu(); });
document.getElementById('ctx-cancel').addEventListener('click',     () => hideCtxMenu());
document.addEventListener('contextmenu', (e) => { e.preventDefault(); showCtxMenu(e.clientX, e.clientY); });
document.addEventListener('click',   (e) => { if (!ctxMenu.contains(e.target)) hideCtxMenu(); });
document.addEventListener('keydown',  (e) => { if (e.key === 'Escape') hideCtxMenu(); });

// ════════════════════════════════════════════
// GHOST ANIMATION ENGINE
// ════════════════════════════════════════════
const commandQueue = [];
let isAnimating = false;

function processQueue() {
  if (isAnimating || commandQueue.length === 0) return;
  isAnimating = true;
  const cmd = commandQueue.shift();

  if (cmd.action === 'draw_line') {
    const y = candles.priceToCoordinate(cmd.price);
    if (y === null) { drawNativeLine(cmd); isAnimating = false; processQueue(); return; }
    const overlay = document.getElementById('anim-overlay');
    const ghost   = document.createElement('div');
    ghost.className = 'ghost-line';
    ghost.style.top   = y + 'px';
    ghost.style.color = cmd.color || '#58A6FF';
    const label = document.createElement('div');
    label.className = 'ghost-label';
    label.innerText = cmd.label || '';
    ghost.appendChild(label);
    const cursor = document.createElement('div');
    cursor.className = 'ghost-cursor';
    ghost.appendChild(cursor);
    overlay.appendChild(ghost);
    requestAnimationFrame(() => {
      ghost.getBoundingClientRect();
      requestAnimationFrame(() => { ghost.style.width = '100%'; label.style.opacity = '1'; });
    });
    setTimeout(() => { drawNativeLine(cmd); ghost.remove(); isAnimating = false; setTimeout(processQueue, 400); }, 1300);
  } else if (cmd.action === 'draw_fib') {
    drawNativeFib(cmd); isAnimating = false; processQueue();
  } else {
    isAnimating = false; processQueue();
  }
}

function drawNativeLine(cmd) {
  const pl = candles.createPriceLine({
    price: cmd.price, color: cmd.color || '#58A6FF',
    lineWidth:1.5, lineStyle:0, axisLabelVisible:true, title: cmd.label || '',
  });
  drawnPriceLines.push({ line:pl, label:cmd.label });
}

function drawNativeFib(cmd) {
  const levels = [0, 0.236, 0.382, 0.5, 0.618, 0.786, 1];
  const colors  = ['#FF6B6B','#FFA500','#FFD700','#00FF88','#58A6FF','#B47FFF','#FF6B6B'];
  levels.forEach((lvl, i) => {
    const price = cmd.high - (cmd.high - cmd.low) * lvl;
    const pl = candles.createPriceLine({
      price, color:colors[i], lineWidth:1, lineStyle:2, axisLabelVisible:true,
      title:`Fib ${(lvl * 100).toFixed(1)}%`,
    });
    drawnPriceLines.push({ line:pl, label:`Fib ${lvl*100}%` });
  });
}

function sendToFlutter(data) {
  try { window.parent.postMessage(JSON.stringify(data), '*'); } catch(e) {}
}

// ════════════════════════════════════════════
// CRYPTO FETCH (ADBLOCK & ISP BYPASS VIA LOCAL PROXY)
// ════════════════════════════════════════════
async function loadCryptoDirect(symbol, interval = '1m') {
  const coin = symbol.split('/')[0]; // BTC
  const pair = coin + 'USDT';
  
  let bars = [];

  const formatBars = (rawBars) => {
    const unique = [];
    let lastTime = 0;
    for (const b of rawBars) {
      if (b.time > lastTime) {
        unique.push(b);
        lastTime = b.time;
      }
    }
    return unique;
  };

  // Clean up previous connections
  if (cryptoWsInterval) { clearInterval(cryptoWsInterval); cryptoWsInterval = null; }
  if (cryptoWsConnection) { cryptoWsConnection.close(); cryptoWsConnection = null; }

  try {
    if (interval === '1s') {
      // 1-SECOND LOGIC: Continuous staircase candles
      let lastProcessedTradeTime = 0;

      chart.applyOptions({
        timeScale: { secondsVisible: true, barSpacing: 14, rightOffset: 10 }
      });
      candles.applyOptions({ autoscaleInfoProvider: undefined });

      const res = await fetch(`/api/mexc/api/v3/trades?symbol=${pair}&limit=200&_t=${Date.now()}`);
      const data = await res.json();

      if (Array.isArray(data) && data.length > 0) {
        data.sort((a,b) => a.time - b.time);
        
        let prevClose = parseFloat(data[0].price);
        let firstSec = Math.floor(data[0].time / 1000);
        let lastSec = Math.floor(data[data.length-1].time / 1000);
        
        // Build an explicit second-by-second continuous array
        const aggMap = {};
        for (const t of data) {
          const secTime = Math.floor(t.time / 1000);
          lastProcessedTradeTime = Math.max(lastProcessedTradeTime, t.time);
          const p = parseFloat(t.price);
          
          if (!aggMap[secTime]) {
            aggMap[secTime] = { time: secTime, open: p, high: p, low: p, close: p };
          } else {
            aggMap[secTime].high  = Math.max(aggMap[secTime].high, p);
            aggMap[secTime].low   = Math.min(aggMap[secTime].low, p);
            aggMap[secTime].close = p;
          }
        }

        // Forward fill missing seconds to make continuous staircase
        bars = [];
        for (let t = firstSec; t <= lastSec; t++) {
          if (aggMap[t]) {
            // Force open to equal previous close for thick connected bodies
            aggMap[t].open = prevClose;
            aggMap[t].high = Math.max(aggMap[t].high, prevClose);
            aggMap[t].low  = Math.min(aggMap[t].low, prevClose);
            bars.push(aggMap[t]);
            prevClose = aggMap[t].close;
          } else {
            // Missing second: flat continuous candle
            bars.push({ time: t, open: prevClose, high: prevClose, low: prevClose, close: prevClose });
          }
        }
        
        if (bars.length > 60) bars = bars.slice(bars.length - 60);

        candles.setData(bars);
        chart.timeScale().scrollToRealTime();

        liveBar = bars[bars.length - 1];
        setStatus('● LIVE ' + symbol + '  ' + liveBar.close.toFixed(2), 'live');
      } else {
        setStatus('● SERVER ERROR: Cannot reach backend proxy', 'error');
        return;
      }

      cryptoWsInterval = setInterval(async () => {
        try {
          const tRes = await fetch(`/api/mexc/api/v3/trades?symbol=${pair}&limit=50&_t=${Date.now()}`);
          const tData = await tRes.json();
          if (Array.isArray(tData) && tData.length > 0) {
            tData.sort((a, b) => a.time - b.time);
            let gotNew = false;
            for (const deal of tData) {
              if (deal.time <= lastProcessedTradeTime) continue;
              lastProcessedTradeTime = deal.time;
              gotNew = true;
              
              const dealTime = Math.floor(deal.time / 1000);
              const price = parseFloat(deal.price);
              
              if (dealTime > liveBar.time) {
                // Forward fill empty seconds before this new trade
                for (let t = liveBar.time + 1; t < dealTime; t++) {
                  candles.update({ time: t, open: liveBar.close, high: liveBar.close, low: liveBar.close, close: liveBar.close });
                }
                // New candle MUST open at the previous close to create a thick body
                liveBar = { time: dealTime, open: liveBar.close, high: Math.max(liveBar.close, price), low: Math.min(liveBar.close, price), close: price };
              } else {
                liveBar.high  = Math.max(liveBar.high, price);
                liveBar.low   = Math.min(liveBar.low, price);
                liveBar.close = price;
              }
              candles.update(liveBar);
            }
            if (gotNew) {
              setStatus('● LIVE ' + symbol + '  ' + liveBar.close.toFixed(2), 'live');
              sendToFlutter({ type: 'price_update', price: liveBar.close });
              chart.timeScale().scrollToRealTime();
            }
          }
        } catch (e) {}
      }, 1000);

      
    } else {
      // STANDARD LOGIC: 1m, 5m, 1h, 1d etc. - reset time scale to normal
      // Remove any Y-axis lock from 1s mode
      candles.applyOptions({ autoscaleInfoProvider: undefined });
      chart.applyOptions({
        timeScale: {
          secondsVisible: false,
          barSpacing: 12,
          rightOffset: 8,
        }
      });
      let mexcInterval = interval;
      if (interval === '1h') mexcInterval = '60m';
      if (interval === '1d') mexcInterval = '1d';

      const res = await fetch(`/api/mexc/api/v3/klines?symbol=${pair}&interval=${mexcInterval}&limit=120&_t=${Date.now()}`);
      const data = await res.json();
      if (Array.isArray(data) && data.length > 0) {
        const raw = data.map(k => ({
          time:  Math.floor(k[0] / 1000),
          open:  parseFloat(k[1]),
          high:  parseFloat(k[2]),
          low:   parseFloat(k[3]),
          close: parseFloat(k[4]),
        }));
        bars = formatBars(raw);
        candles.setData(bars);
        chart.timeScale().fitContent();
        const last = bars[bars.length - 1];
        liveBar = { time: last.time, open: last.open, high: last.high, low: last.low, close: last.close };
        setStatus('● LIVE ' + symbol, 'live');
      } else {
        setStatus('● SERVER ERROR: Cannot reach backend proxy', 'error');
        return;
      }

      // Poll for Live Candle via Proxy (every 2s)
      cryptoWsInterval = setInterval(async () => {
        try {
          const res = await fetch(`/api/mexc/api/v3/klines?symbol=${pair}&interval=${mexcInterval}&limit=1&_t=${Date.now()}`);
          const data = await res.json();
          if (Array.isArray(data) && data.length > 0) {
            const k = data[0];
            const candleTime = Math.floor(k[0] / 1000);
            const price = parseFloat(k[4]); // close price

            liveBar = { 
              time: candleTime, 
              open: parseFloat(k[1]), 
              high: parseFloat(k[2]), 
              low: parseFloat(k[3]), 
              close: price 
            };
            
            candles.update(liveBar);
            setStatus('● LIVE ' + symbol + '  ' + price.toFixed(2), 'live');
            sendToFlutter({ type: 'price_update', price: price });
          }
        } catch (e) {}
      }, 2000);
    }
  } catch (e) {
    console.error("Local MEXC proxy failed:", e);
    setStatus('● SERVER ERROR: Cannot reach backend proxy', 'error');
  }
}

// ════════════════════════════════════════════
// FLUTTER COMMANDS
// ════════════════════════════════════════════
let currentSymbol = '';
let currentInterval = '1m';
let drawingMode   = 'auto';
let activeTool    = null;
let drawnPriceLines = [];
let pendingFibClick = null;
let liveBar = { time: 0, open: 0, high: 0, low: 0, close: 0 };
let cryptoWsConnection = null; // Store WS reference
let cryptoWsInterval = null; // Store REST polling reference

window.fromFlutter = function(cmd) {
  switch(cmd.action) {
    case 'set_symbol':
      clearAllDrawings();
      candles.setData([]);
      currentSymbol = cmd.symbol;
      if (cmd.interval) {
        currentInterval = cmd.interval;
        chart.applyOptions({
          timeScale: { secondsVisible: currentInterval === '1s' }
        });
      }
      liveBar = { time: 0, open: 0, high: 0, low: 0, close: 0 };
      setStatus('● LOADING ' + cmd.symbol + '...', 'loading');
      
      if (cmd.symbol.includes('BTC') || cmd.symbol.includes('ETH') || cmd.symbol.includes('SOL') || cmd.symbol.includes('XRP') || cmd.symbol.includes('DOGE')) {
        // Crypto -> fetch directly
        loadCryptoDirect(cmd.symbol, currentInterval);
      } else {
        // Forex -> wait for history/tick from Flutter
        if (cryptoWsInterval) { clearInterval(cryptoWsInterval); cryptoWsInterval = null; }
        if (cryptoWsConnection) { cryptoWsConnection.close(); cryptoWsConnection = null; }
      }
      break;

    case 'history':
      // Only process if it's NOT crypto (since crypto is handled directly now)
      if (!(currentSymbol.includes('BTC') || currentSymbol.includes('ETH') || currentSymbol.includes('SOL') || currentSymbol.includes('XRP') || currentSymbol.includes('DOGE'))) {
        if (cmd.data && cmd.data.length > 0) {
          candles.setData(cmd.data);
          chart.timeScale().fitContent();
          setStatus('● LIVE ' + currentSymbol, 'live');
          const last = cmd.data[cmd.data.length - 1];
          liveBar = { time: last.time, open: last.close, high: last.close, low: last.close, close: last.close };
        }
      }
      break;

    case 'tick':
      // Only process if it's NOT crypto
      if (!(currentSymbol.includes('BTC') || currentSymbol.includes('ETH') || currentSymbol.includes('SOL') || currentSymbol.includes('XRP') || currentSymbol.includes('DOGE'))) {
        if (!cmd.price || cmd.price <= 0) break;
        const price   = cmd.price;
        const nowSec  = cmd.time || Math.floor(Date.now() / 1000);
        const barTime = nowSec - (nowSec % 60);

        if (barTime !== liveBar.time) {
          liveBar = { time: barTime, open: price, high: price, low: price, close: price };
        } else {
          liveBar.high  = Math.max(liveBar.high, price);
          liveBar.low   = Math.min(liveBar.low,  price);
          liveBar.close = price;
        }
        candles.update({ ...liveBar });
        setStatus('● LIVE ' + currentSymbol + '  ' + price.toFixed(5), 'live');
      }
      break;

    case 'draw_line':
      commandQueue.push(cmd); processQueue(); break;

    case 'draw_fib':
      commandQueue.push(cmd); processQueue(); break;

    case 'clear':
      clearAllDrawings(); break;

    case 'set_mode':
      drawingMode = cmd.mode;
      activeTool  = null;
      pendingFibClick = null;
      container.style.cursor = 'default';
      break;

    case 'set_tool':
      activeTool  = (cmd.tool === 'none') ? null : cmd.tool;
      pendingFibClick = null;
      container.style.cursor = activeTool ? 'crosshair' : 'default';
      break;

    case 'validate':
      candles.createPriceLine({
        price: cmd.price,
        color: cmd.agree ? '#00FF88' : '#FF3B3B',
        lineWidth:1.5, lineStyle:0, axisLabelVisible:true,
        title: cmd.agree ? '✓ Den agrees' : '✗ Trap — careful',
      });
      break;
  }
}

function signalReady() { sendToFlutter({ type:'ready' }); }
signalReady();
setTimeout(signalReady, 500);
setTimeout(signalReady, 1500);

window.addEventListener('message', (ev) => {
  try {
    const str = typeof ev.data === 'string' ? ev.data : JSON.stringify(ev.data);
    const cmd = JSON.parse(str);
    if (cmd && typeof cmd === 'object') fromFlutter(cmd);
  } catch(e) {}
});
</script>
</body>
</html>
