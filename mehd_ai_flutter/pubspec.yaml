name: mehd_ai_flutter
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  fl_chart: ^0.68.0
  http: ^1.6.0
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  firebase_messaging: ^16.1.0
  provider: ^6.1.5+1
  google_fonts: ^6.3.0
  animated_text_kit: ^4.3.0
  flutter_secure_storage: ^9.2.4
  google_sign_in: ^6.2.2
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  cloud_functions: ^6.1.0
  webview_flutter: ^4.8.0
  web_socket_channel: ^3.0.3
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/mehd_logo.png"
  image_path: "assets/images/mehd_logo.png"
  adaptive_icon_background: "#0D1117"
  adaptive_icon_foreground: "assets/images/mehd_logo.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
    - assets/chart/
    - assets/chart/chart.html
    - assets/chart/lightweight-charts.min.js
    - assets/data/
