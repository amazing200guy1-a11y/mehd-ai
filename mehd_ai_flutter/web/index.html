<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mehd_ai_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>mehd_ai_flutter</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0D1117;
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #58A6FF;
      font-family: 'JetBrains Mono', monospace;
    }
    .loader {
      text-align: center;
    }
    .glitch {
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 5px;
      margin-bottom: 20px;
      animation: blink 1.5s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
    .cube {
      width: 40px;
      height: 40px;
      border: 2px solid #58A6FF;
      margin: 0 auto;
      animation: rotate 2s infinite linear;
      box-shadow: 0 0 15px rgba(88, 166, 255, 0.4);
    }
    @keyframes rotate {
      0% { transform: rotateX(0deg) rotateY(0deg); }
      100% { transform: rotateX(360deg) rotateY(360deg); }
    }
  </style>
</head>
<body>
  <div id="loading" class="loader">
    <div class="cube"></div>
    <div class="glitch">MEHD AI</div>
    <div style="font-size: 10px; opacity: 0.4; letter-spacing: 2px;">SYNCHRONIZING KERNEL...</div>
  </div>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Remove loader once the page is fully loaded or engine is ready
      // Flutter 3.22+ handles some of this via bootstrap, but extra safety:
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              var node = mutation.addedNodes[i];
              if (node.tagName === 'FLUTTER-VIEW') {
                document.getElementById('loading').remove();
                observer.disconnect();
              }
            }
          }
        });
      });
      observer.observe(document.body, { childList: true });
    });
  </script>
</body>
</html>
