<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="mehd_ai_flutter">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <title>Mehd AI Terminal</title>
  <link rel="manifest" href="manifest.json?v=1.0.3">
  <script>
    // Hardened Localhost Freshness — Only aggressive on dev envs
    const isLocal = true; // FORCE true to bypass localtunnel service worker bugs
    window.__MEHD_BUILD__ = "1.0.4";

    // Aggressively wipe ALL caches and service workers on localhost
    if (isLocal) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (let registration of registrations) {
            registration.unregister();
            console.log('[MEHD] Dev Mode: Unregistered legacy ServiceWorker.');
          }
        });
      }
      // Also clear all browser caches
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (let name of names) {
            caches.delete(name);
            console.log('[MEHD] Dev Mode: Deleted cache:', name);
          }
        });
      }
    }
  </script>
  <style>
    body {
      background-color: #02040A; /* Deep organic dark */
      margin: 0;
      padding: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .loader {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .pulsing-logo {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(88, 166, 255, 0.8) 0%, rgba(88, 166, 255, 0.2) 100%);
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.4);
      animation: pulse 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
      margin-bottom: 24px;
    }
    @keyframes pulse {
      0% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(88, 166, 255, 0.4); }
      50% { transform: scale(1.05); opacity: 1; box-shadow: 0 0 0 10px rgba(88, 166, 255, 0); }
      100% { transform: scale(0.95); opacity: 0.7; box-shadow: 0 0 0 0 rgba(88, 166, 255, 0); }
    }
    .loading-text {
      font-size: 14px;
      letter-spacing: 2px;
      color: #888888;
      font-weight: 300;
      animation: fade 2s infinite ease-in-out;
    }
    @keyframes fade {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="loading" class="loader">
    <div class="pulsing-logo"></div>
    <div class="loading-text">CONNECTING TO DEN</div>
  </div>
  <script src="flutter_bootstrap.js?v=1.0.4" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      // Remove loader once the page is fully loaded or engine is ready
      // Flutter 3.22+ handles some of this via bootstrap, but extra safety:
      var observer = new MutationObserver(function(mutations) {
        mutations.forEach(function(mutation) {
          if (mutation.addedNodes.length > 0) {
            for (var i = 0; i < mutation.addedNodes.length; i++) {
              var node = mutation.addedNodes[i];
              if (node.tagName === 'FLUTTER-VIEW') {
                document.getElementById('loading').remove();
                observer.disconnect();
              }
            }
          }
        });
      });
      observer.observe(document.body, { childList: true });
    });
  </script>
</body>
</html>
